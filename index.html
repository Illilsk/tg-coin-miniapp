<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Монетка</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <main class="app">
      <section class="coin-stage" aria-live="polite">
        <div class="fireworks" id="fireworks" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div class="coin" id="coin" data-side="heads">
          <div class="coin-face coin-front">
            <svg viewBox="0 0 160 160" role="img" aria-label="Орел">
              <circle cx="80" cy="80" r="62" class="coin-rim" />
              <circle cx="80" cy="80" r="49" class="inner-ring" />
              <path
                class="engrave-shadow"
                d="M80 34c7 7 13 15 18 24 12-8 25-11 39-8-8 7-17 14-29 21 9 7 15 17 18 30-11-3-22-7-33-13v30l14 10-20 2-7 14-7-14-20-2 14-10V88c-11 6-22 10-33 13 3-13 9-23 18-30-12-7-21-14-29-21 14-3 27 0 39 8 5-9 11-17 18-24Z"
              />
              <path
                class="engrave-main"
                d="M80 30c7 7 13 15 18 24 12-8 25-11 39-8-8 7-17 14-29 21 9 7 15 17 18 30-11-3-22-7-33-13v30l14 10-20 2-7 14-7-14-20-2 14-10V84c-11 6-22 10-33 13 3-13 9-23 18-30-12-7-21-14-29-21 14-3 27 0 39 8 5-9 11-17 18-24Z"
              />
              <path class="engrave-cut" d="M66 45c-4 3-8 7-11 12 6 4 13 8 20 12-4-8-7-16-9-24Z" />
              <path class="engrave-cut" d="M94 45c4 3 8 7 11 12-6 4-13 8-20 12 4-8 7-16 9-24Z" />
              <circle cx="64" cy="62" r="4" class="engrave-cut" />
              <circle cx="96" cy="62" r="4" class="engrave-cut" />
              <path class="engrave-cut" d="M73 78h14l-7 9-7-9Z" />
            </svg>
          </div>
          <div class="coin-face coin-back">
            <svg viewBox="0 0 160 160" role="img" aria-label="Решка">
              <circle cx="80" cy="80" r="62" class="coin-rim" />
              <circle cx="80" cy="80" r="49" class="inner-ring" />
              <path
                class="engrave-shadow"
                d="M66 38h24v72h-17V61l-14 9-8-14 15-18Z"
              />
              <path
                class="engrave-main"
                d="M64 34h24v72h-17V57l-14 9-8-14 15-18Z"
              />
              <path class="engrave-line" d="M38 116c14 12 70 12 84 0" />
              <path class="engrave-line" d="M44 128c18 10 54 10 72 0" />
              <path class="engrave-line" d="M108 48c10 7 17 18 17 32s-7 25-17 32" />
              <path class="engrave-line" d="M52 48c-10 7-17 18-17 32s7 25 17 32" />
              <text x="80" y="135" text-anchor="middle" class="coin-text">РЕШКА</text>
            </svg>
          </div>
        </div>
      </section>

      <section class="panel">
        <p class="eyebrow">Подброс монетки</p>
        <h1 id="result">Нажмите кнопку</h1>
        <p class="intro">
          Мини-игра для быстрого выбора: подбросьте монетку и получите случайный результат.
        </p>
        <p class="hint" id="hint">Результат появится после подбрасывания.</p>
        <button class="flip-button" id="flipButton" type="button">
          Подбросить
        </button>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
